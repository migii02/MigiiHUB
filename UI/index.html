<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIGII HUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        :root{
            /* Modern Dark Theme Colors */
            --bg: #09090b;          
            --card: #18181b;        
            --card-hover: #27272a;  
            --border: #27272a;      
            --text: #f8fafc;        
            --dim: #a1a1aa;         
            --primary: #6366f1;     
            --primary-hover: #4f46e5;
            --discord: #5865F2;
            --green: #10b981;
            --red: #ef4444;
            --r-box: 20px;
            --r-pill: 99px;
            --max-w: 500px; /* Ukuran Mobile */
        }

        body{
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .wrap{max-width:var(--max-w);margin:0 auto;padding:0 16px;position:relative; transition: max-width 0.3s ease;}

        /* Top Bar */
        .dbar{text-align:center;padding:10px 0;font-size:11px;color:var(--dim); font-weight: 500;}

        /* Header */
        .hdr{text-align:center;padding:24px 0 20px}
        .logo{
            width:84px;height:84px;border-radius:24px;
            object-fit:cover;margin-bottom:16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            background: var(--card);
        }
        .hdr h1{font-size:26px;font-weight:800; letter-spacing: -0.5px;}
        .hdr p{color:var(--dim);font-size:13px;margin-top:4px; font-weight: 500;}

        /* Community / Discord Card */
        .dc{background:var(--card);border:1px solid var(--border);border-radius:var(--r-box);padding:24px;margin:12px 0;text-align:center;}
        .dc-ico{width:40px;height:40px;border-radius:12px;background:rgba(88, 101, 242, 0.1);display:flex;align-items:center;justify-content:center; margin: 0 auto 12px;}
        .dc-ico svg{width:22px;height:22px;fill:var(--discord)}
        .dc h2{font-size:16px;font-weight:700; margin-bottom: 4px;}
        .dc .sub{color:var(--dim);font-size:12px;margin-bottom:16px;}

        .m-row{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
        .m-box{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);padding:8px 14px;border-radius:var(--r-pill);font-size:12px;font-weight:600;}
        .dot{width:8px;height:8px;border-radius:50%}
        .dot-g{background:var(--green);box-shadow:0 0 8px rgba(16, 185, 129, 0.5);}

        /* Modern Buttons */
        .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:14px;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s ease;}
        .btn:active{transform:scale(.97)}
        .btn-dc{background: var(--discord); color: #fff;}
        .btn-dc:hover{background: #4752C4;}
        .btn-don{background: var(--bg); color: var(--text); border: 1px solid var(--border); margin-top: 10px;}
        .btn-don:hover{background: var(--border);}
        .btn svg{width:18px;height:18px;fill:currentColor}

        /* Tabs Navigation */
        .tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:6px;margin:24px 0;gap:6px}
        .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;font-family:inherit;transition:all .2s;}
        .tab svg{width:16px;height:16px;fill:currentColor}
        .tab.act{background:var(--bg); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2);}

        .tpanel{display:none}
        .tpanel.act{display:block;animation:fadeIn .3s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

        /* Universal Script Card */
        .usc { background: var(--card); border: 1px solid var(--primary); border-radius: 16px; padding: 18px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.1); }
        .usc-info h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .usc-info p { font-size: 12px; color: var(--dim); }
        .btn-copy { background: var(--primary); color: #fff; padding: 12px 18px; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; transition: all .2s ease; white-space: nowrap; }
        .btn-copy:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-copy:active { transform: scale(0.96); }

        /* Search Box */
        .search-box { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; margin-bottom: 24px; transition: border .2s;}
        .search-box:focus-within { border-color: var(--primary); }
        .search-box svg { width: 18px; height: 18px; fill: var(--dim); margin-right: 12px; }
        .search-box input { flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 14px; outline: none; }
        .search-box input::placeholder { color: var(--dim); }

        /* Section Titles */
        .sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px; padding: 0 4px;}
        .sec-t{font-size:14px;font-weight:700;}
        .sec-c{font-size:12px;color:var(--dim); font-weight: 500;}

        /* Modern List Items (Bisa diklik) */
        .list{display:flex;flex-direction:column;gap:10px}
        .item{display:flex;align-items:center;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:16px;gap:16px;transition:all .2s ease; cursor: pointer; position: relative;}
        .item:hover{background: var(--card-hover); border-color: #3f3f46; transform: translateY(-2px);}
        .item-img{
            width:52px;height:52px;border-radius:12px;
            object-fit:cover;background:var(--bg);
            flex-shrink:0;border:1px solid var(--border);
        }
        .item-info{flex:1;min-width:0}
        .item-name{font-size:14px;font-weight:600;color:var(--text); margin-bottom: 4px; white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .item-click-hint {position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--primary); opacity: 0; transition: opacity .2s; font-size: 12px; font-weight: 600; background: rgba(99, 102, 241, 0.1); padding: 4px 10px; border-radius: 8px;}
        .item:hover .item-click-hint {opacity: 1;}

        /* Status Badges */
        .st{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600; padding: 4px 10px; border-radius: 99px;}
        .st-w{background: rgba(16, 185, 129, 0.1); color: var(--green);}
        .st-p{background: rgba(239, 68, 68, 0.1); color: var(--red);}
        .st-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor;}

        /* MODAL POPUP CHANGELOG */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            opacity: 0; visibility: hidden;
            transition: all .3s ease;
        }
        .modal-overlay.act { opacity: 1; visibility: visible; }
        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%; max-width: 420px;
            max-height: 85vh;
            display: flex; flex-direction: column;
            transform: scale(0.95) translateY(10px);
            transition: all .3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .modal-overlay.act .modal-box { transform: scale(1) translateY(0); }
        .modal-hdr { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .modal-hdr h3 { font-size: 16px; font-weight: 700; color: var(--text); }
        .modal-close { background: var(--bg); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 50%; color: var(--dim); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
        .modal-close:hover { background: var(--border); color: var(--text); }
        
        /* Modal Body & Feature Formatting */
        .modal-body { padding: 24px; overflow-y: auto; }
        .feat-group { margin-bottom: 20px; }
        .feat-group:last-child { margin-bottom: 0; }
        .feat-cat { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .feat-list { list-style: none; margin-left: 0; }
        .feat-list li { position: relative; padding-left: 16px; margin-bottom: 6px; font-size: 13px; color: #e4e4e7; line-height: 1.5; }
        .feat-list li::before { content: "•"; position: absolute; left: 0; color: var(--primary); font-weight: bold; }

        /* FAQ Styling */
        .faq{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden; transition: background .2s;}
        .faq:hover {background: var(--card-hover);}
        .faq-q{padding:18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:13px;font-weight:600;}
        .faq-q svg{width:16px;height:16px;fill:var(--dim);transition:transform .3s}
        .faq.open .faq-q svg{transform:rotate(180deg); fill: var(--text);}
        .faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease;}
        
        /* WARNA TEKS JAWABAN FAQ DIPERTERANG */
        .faq-a-in{padding:0 18px 18px;font-size:13px;color:#d4d4d8;line-height:1.6} 
        .faq.open .faq-a{max-height:800px} /* Height dibesarkan agar tidak kepotong */

        /* Footer */
        .ft{text-align:center;padding:32px 0;margin-top:20px;}
        .ft p{font-size:12px;color:var(--dim); font-weight: 500;}

        /* ========================================= */
        /* PC / DESKTOP MODE RESPONSIVE (GRID 2 KOLOM) */
        /* ========================================= */
        @media(min-width: 768px) {
            :root { --max-w: 800px; } /* Lebar maksimal di PC ditingkatkan */
            .list { 
                display: grid; 
                grid-template-columns: repeat(2, 1fr); /* Membagi daftar jadi 2 kolom menyamping */
                gap: 16px; 
            }
            .hdr h1 { font-size: 32px; }
            .dc { padding: 32px; }
            .tabs { padding: 8px; margin: 32px 0 24px; }
            .tab { padding: 14px; font-size: 14px; }
            .usc { padding: 24px; }
        }

    </style>
</head>

    { q: "Apa itu Script Roblox?", a: "Script adalah kode tambahan yang dijalankan di game Roblox untuk memberikan fitur ekstra." },

// ==========================================
// CORE FUNCTIONS
// ==========================================

function init() {
    document.getElementById('logo').src = CONFIG.LOGO;
    document.getElementById('siteName').textContent = CONFIG.NAME;
    document.getElementById('siteDesc').textContent = CONFIG.DESC;
    document.getElementById('dcL').href = CONFIG.DISCORD;
    document.getElementById('donL').href = CONFIG.DONATE;
    
    // Safety check tab
    let savedTab = localStorage.getItem('activeHubTab') || 'scripts';
    if (!document.querySelector(`.tab[data-target="${savedTab}"]`)) {
        savedTab = 'scripts';
    }
    switchTab(savedTab);

    renderFAQ();
    filterScripts();
    detectDevice();
    
    fetchDiscord();
    setInterval(fetchDiscord, 60000); 
}

function detectDevice() {
    const ua = navigator.userAgent;
    let deviceType = 'Desktop Device';
    if (/Android/i.test(ua)) deviceType = 'Android Device';
    else if (/iPhone|iPad/i.test(ua)) deviceType = 'iOS Device';
    document.getElementById('dbar').innerHTML = `Connected via ${deviceType}`;
}

async function fetchDiscord() {
    try {
        const code = CONFIG.DISCORD.split('/').pop();
        const res = await fetch(`https://discord.com/api/v9/invites/${code}?with_counts=true`);
        const data = await res.json();
        document.getElementById('onC').textContent = (data.approximate_presence_count || 0).toLocaleString();
        document.getElementById('totC').textContent = (data.approximate_member_count || 0).toLocaleString();
    } catch {
        document.getElementById('onC').textContent = '—';
        document.getElementById('totC').textContent = '—';
    }
}

function switchTab(targetId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('act'));
    document.querySelectorAll('.tpanel').forEach(p => p.classList.remove('act'));
    document.querySelector(`.tab[data-target="${targetId}"]`).classList.add('act');
    document.getElementById('t-' + targetId).classList.add('act');
    localStorage.setItem('activeHubTab', targetId);
}

// COPY UNIVERSAL SCRIPT
function copyUniversalScript(btn) {
    const scriptCode = 'loadstring(game:HttpGet("https://raw.githubusercontent.com/migii02/MigiiHUB/refs/heads/main/Main.lua"))()';
    navigator.clipboard.writeText(scriptCode).then(() => {
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg> Tersalin!';
        btn.style.background = 'var(--green)';
        
        setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.style.background = '';
        }, 2000);
    });
}

function filterScripts() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const el = document.getElementById('sList');
    
    const filtered = SCRIPTS.filter(s => s.name.toLowerCase().includes(query));
    
    const wCount = SCRIPTS.filter(s => s.status === 'working').length;
    document.getElementById('sCount').textContent = `${wCount} Working`;
    
    el.innerHTML = filtered.map(s => `
        <div class="item" onclick="openModal('${s.name}')">
            <img class="item-img" src="${s.img}" alt="${s.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzI3MjcyYSIvPjwvc3ZnPg=='">
            <div class="item-info">
                <div class="item-name">${s.name}</div>
                <div class="st ${s.status === 'working' ? 'st-w' : 'st-p'}">
                    <span class="st-dot"></span>
                    ${s.status === 'working' ? 'Working' : 'Patched'}
                </div>
            </div>
            <div class="item-click-hint">Lihat Fitur ➔</div>
        </div>
    `).join('');
}

// ==========================================
// MODAL LOGIC (Menampilkan Fitur)
// ==========================================

function openModal(gameName) {
    const overlay = document.getElementById('modalOverlay');
    const body = document.getElementById('modalBody');
    const title = document.getElementById('modalTitle');

    const gameData = SCRIPTS.find(s => s.name === gameName);

    title.textContent = `Fitur: ${gameName}`;
    
    if (gameData && gameData.features) {
        body.innerHTML = gameData.features;
    } else {
        body.innerHTML = '<div style="color: var(--dim); text-align: center;">Tidak ada data fitur untuk game ini.</div>';
    }
    
    overlay.classList.add('act');
}

function closeModal(event, forceClose = false) {
    if (forceClose || event.target.id === 'modalOverlay') {
        document.getElementById('modalOverlay').classList.remove('act');
    }
}

// Render Dropdown FAQ
function renderFAQ() {
    document.getElementById('faqList').innerHTML = FAQ.map(f => `
        <div class="faq" onclick="this.classList.toggle('open')">
            <div class="faq-q">
                <span>${f.q}</span>
                <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <div class="faq-a"><div class="faq-a-in">${f.a}</div></div>
        </div>
    `).join('');
}

document.addEventListener('DOMContentLoaded', init);
